[build]
  command = "pnpm run build"
  publish = "dist"
  ignore = "! git describe --exact-match --tags HEAD 2>/dev/null"

[build.environment]
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Content-Security-Policy = "default-src 'unsafe-inline' 'self'; frame-ancestors 'none';"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
