name: Deploy to Firebase Hosting on merge
"on":
  push:
    branches:
      - main
  schedule:
    - cron: "0 4,16 * * *" # every day at 4 am and pm UTC
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: "Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 10.x
      - run: pnpm install && pnpm exec playwright install && pnpm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYSITE_286621 }}"
          channelId: live
          projectId: mysite-286621
