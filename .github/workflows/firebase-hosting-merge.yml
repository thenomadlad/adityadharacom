# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on tag
"on":
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 4 * * 1" # every Monday at 4 AM UTC
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Checkout latest tag on scheduled run
        if: github.event_name == 'schedule'
        run: git checkout $(git describe --tags --abbrev=0)
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: "Install pnpm"
        uses: pnpm/action-setup@v4
        with:
          version: 10.x
      - run: pnpm install && pnpm exec playwright install && pnpm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_MYSITE_286621 }}"
          channelId: live
          projectId: mysite-286621
